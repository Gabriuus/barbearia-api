openapi: 3.0.0
info:
  title: Sistema de Barbearia API
  description: API RESTful desenvolvida com Laravel 12 para gestão de uma barbearia. Suporta agendamentos, clientes e administradores com autenticação via Sanctum.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Servidor Local
paths:
  /register:
    post:
      summary: Cadastro de Cliente
      description: Rota pública para registrar novos clientes na plataforma.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                password_confirmation:
                  type: string
                phone:
                  type: string
                address:
                  type: string
                city:
                  type: string
      responses:
        '201':
          description: Cliente registrado com sucesso
  /login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Retorna o token Sanctum
  /logout:
    post:
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout realizado com sucesso
  /admin/admins:
    post:
      summary: Cadastro de novo Administrador
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                password_confirmation:
                  type: string
      responses:
        '201':
          description: Administrador registrado com sucesso
  /admin/schedulings:
    get:
      summary: Ver Agenda (Admin)
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Lista paginada de agendamentos
  /client/schedulings:
    get:
      summary: Ver Minha Agenda (Cliente)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista paginada de agendamentos
    post:
      summary: Criar Agendamento
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                start_date:
                  type: string
                  format: date-time
                end_date:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Agendamento criado
        '422':
          description: Conflito de horário ou erro de validação
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
